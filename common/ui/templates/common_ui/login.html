{% extends "common_ui/base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="auth-card">
  <h1 class="auth-title">ログイン</h1>

  <div id="error-msg" class="message message-error" hidden></div>

  <form id="login-form" class="auth-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">メールアドレス</label>
      <input class="form-input" type="email" id="email" name="email"
             placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">パスワード</label>
      <input class="form-input" type="password" id="password" name="password"
             required autocomplete="current-password">
    </div>
    <button class="btn btn-primary" type="submit">ログイン</button>
  </form>

  <div class="auth-divider">または</div>

  <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline">
    Google でログイン
  </a>

  <p class="auth-footer">
    アカウントをお持ちでない方は
    <a href="{{ url_for('common_ui.register_page') }}">新規登録</a>
  </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');
    errorEl.hidden = true;

    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: e.target.email.value,
        password: e.target.password.value,
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'ログインに失敗しました';
      errorEl.hidden = false;
      return;
    }

    localStorage.setItem('token', data.token);
    window.location.href = '{{ url_for("common_ui.profile_page") }}';
  });
</script>
{% endblock %}
