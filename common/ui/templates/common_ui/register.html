{% extends "common_ui/base.html" %}

{% block title %}新規登録{% endblock %}

{% block content %}
<div class="auth-card">
  <h1 class="auth-title">新規登録</h1>

  <div id="error-msg" class="message message-error" hidden></div>
  <div id="success-msg" class="message message-success" hidden></div>

  <form id="register-form" class="auth-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="display_name">表示名（任意）</label>
      <input class="form-input" type="text" id="display_name" name="display_name"
             placeholder="山田 太郎" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label" for="email">メールアドレス</label>
      <input class="form-input" type="email" id="email" name="email"
             placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">パスワード（8文字以上）</label>
      <input class="form-input" type="password" id="password" name="password"
             required autocomplete="new-password" minlength="8">
    </div>
    <button class="btn btn-primary" type="submit">登録する</button>
  </form>

  <div class="auth-divider">または</div>

  <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline">
    Google で登録
  </a>

  <p class="auth-footer">
    すでにアカウントをお持ちの方は
    <a href="{{ url_for('common_ui.login_page') }}">ログイン</a>
  </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl   = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');
    errorEl.hidden   = true;
    successEl.hidden = true;

    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:        e.target.email.value,
        password:     e.target.password.value,
        display_name: e.target.display_name.value || undefined,
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || '登録に失敗しました';
      errorEl.hidden = false;
      return;
    }

    localStorage.setItem('token', data.token);
    successEl.textContent = '登録が完了しました。プロフィール画面に移動します…';
    successEl.hidden = false;

    setTimeout(() => {
      window.location.href = '{{ url_for("common_ui.profile_page") }}';
    }, 1000);
  });
</script>
{% endblock %}
